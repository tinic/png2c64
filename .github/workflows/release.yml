name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install GCC 15 and CMake
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 cmake ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_CXX_COMPILER=g++-15

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: build/png2c64
          if-no-files-found: error

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install GCC 15 and CMake
        run: brew install gcc@15 cmake ninja

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_CXX_COMPILER=g++-15

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/png2c64
          if-no-files-found: error

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup MSYS2 (UCRT64) with GCC 15
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Show compiler version
        run: |
          g++ --version
          cmake --version

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: build/png2c64.exe
          if-no-files-found: error

  release:
    name: Package and publish
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble flat release zip
        run: |
          mkdir release
          cp artifacts/linux-x86_64/png2c64       release/png2c64-linux-x86_64
          cp artifacts/macos-arm64/png2c64        release/png2c64-macos-arm64
          cp artifacts/windows-x86_64/png2c64.exe release/png2c64-windows-x86_64.exe
          chmod +x release/png2c64-linux-x86_64 release/png2c64-macos-arm64
          cd release
          zip "../png2c64-${GITHUB_REF_NAME}.zip" *
          ls -la "../png2c64-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: png2c64-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
